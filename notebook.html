<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>✦ Memora · Smart Notebook</title>
  <!-- Fonts & Icons -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <!-- Quill Editor -->
  <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
  <!-- localForage (IndexedDB wrapper) -->
  <script src="https://cdn.jsdelivr.net/npm/localforage@1.10.0/dist/localforage.min.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: "Inter", sans-serif;
      background: #f5f7fc;
      height: 100vh;
      display: flex;
      transition: background 0.3s, color 0.2s;
      color: #1e1e2f;
    }

    /* DARK MODE */
    body.dark {
      background: #0f0f1a;
      color: #e8eaff;
    }
    body.dark .sidebar {
      background: rgba(22, 25, 37, 0.9);
      backdrop-filter: blur(16px);
      border-right: 1px solid #2f3349;
    }
    body.dark .editor-container {
      background: #181c2c;
    }
    body.dark .ql-toolbar.ql-snow,
    body.dark .ql-container.ql-snow {
      border-color: #2e3440;
    }
    body.dark .ql-editor {
      color: #e2e6ff;
    }
    body.dark .note-item {
      background: #1e2338;
    }
    body.dark .note-item:hover {
      background: #2a3150;
    }
    body.dark .note-item.active {
      background: #3f4a7a;
      border-left: 4px solid #a9b7ff;
    }
    body.dark input, body.dark select, body.dark .category-input {
      background: #262d44;
      border-color: #414b6e;
      color: #f0f3ff;
    }
    body.dark .storage-bar-bg {
      background: #292f4c;
    }

    /* SIDEBAR */
    .sidebar {
      width: 320px;
      background: rgba(255, 255, 255, 0.82);
      backdrop-filter: blur(16px);
      border-right: 1px solid rgba(0,0,0,0.05);
      display: flex;
      flex-direction: column;
      padding: 20px 16px;
      box-shadow: 4px 0 20px rgba(0,0,0,0.02);
      transition: all 0.2s;
    }

    .app-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
    }
    .app-header h2 {
      font-weight: 600;
      font-size: 1.8rem;
      letter-spacing: -0.02em;
      background: linear-gradient(135deg, #3b3f8c, #9b6dff);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    .darkmode-toggle {
      background: none;
      border: none;
      font-size: 1.4rem;
      cursor: pointer;
      color: #5b5f8c;
      transition: 0.2s;
      width: 36px;
      height: 36px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(128, 140, 200, 0.1);
    }
    .darkmode-toggle:hover {
      background: rgba(128, 140, 200, 0.25);
    }

    .btn-primary {
      background: #3a41b0;
      color: white;
      border: none;
      padding: 12px 18px;
      border-radius: 20px;
      font-weight: 500;
      font-size: 1rem;
      cursor: pointer;
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      box-shadow: 0 8px 18px rgba(58, 65, 176, 0.2);
      transition: all 0.2s;
      margin-bottom: 16px;
    }
    .btn-primary:hover {
      background: #4f58d4;
      transform: translateY(-2px);
      box-shadow: 0 12px 22px rgba(58, 65, 176, 0.3);
    }

    .search-section {
      margin-bottom: 18px;
    }
    .search-wrapper {
      display: flex;
      background: rgba(0,0,0,0.03);
      border-radius: 30px;
      padding: 4px 4px 4px 16px;
      align-items: center;
      border: 1px solid rgba(128,128,160,0.15);
    }
    .search-wrapper i {
      color: #7a7fa3;
    }
    .search-wrapper input {
      border: none;
      background: transparent;
      padding: 10px 8px;
      font-size: 0.95rem;
      width: 100%;
      outline: none;
    }

    .filter-row {
      display: flex;
      gap: 8px;
      margin: 8px 0 16px;
    }
    select {
      flex: 1;
      padding: 10px 12px;
      border-radius: 18px;
      border: 1px solid rgba(128,128,160,0.2);
      background: rgba(255,255,255,0.6);
      font-size: 0.9rem;
      outline: none;
    }

    .notes-list {
      flex: 1;
      overflow-y: auto;
      margin-top: 6px;
    }
    .note-item {
      background: white;
      padding: 14px 16px;
      margin-bottom: 8px;
      border-radius: 18px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.02);
      cursor: pointer;
      transition: all 0.15s;
      border: 1px solid transparent;
      backdrop-filter: blur(4px);
    }
    .note-item:hover {
      background: #f0f2fe;
      border-color: #b6befa;
    }
    .note-item.active {
      background: #e6eaff;
      border-left: 4px solid #3a41b0;
    }
    .note-title {
      font-weight: 600;
      margin-bottom: 4px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .note-meta {
      display: flex;
      justify-content: space-between;
      font-size: 0.75rem;
      color: #6b6f8f;
    }
    .category-badge {
      background: #d9dfff;
      padding: 2px 10px;
      border-radius: 30px;
      font-size: 0.7rem;
      font-weight: 500;
    }

    .storage-panel {
      margin-top: 16px;
      padding-top: 12px;
      border-top: 1px dashed #b5bad3;
    }
    .storage-info {
      display: flex;
      justify-content: space-between;
      font-size: 0.8rem;
      margin-bottom: 6px;
    }
    .storage-bar-bg {
      height: 8px;
      background: #dfe3f2;
      border-radius: 20px;
      overflow: hidden;
    }
    .storage-bar-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #4f46e5, #a78bfa);
      border-radius: 20px;
    }
    .extra-actions {
      display: flex;
      gap: 8px;
      margin-top: 12px;
    }
    .icon-btn {
      background: rgba(128,140,200,0.1);
      border: none;
      padding: 8px 12px;
      border-radius: 30px;
      font-size: 0.8rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: 0.2s;
    }
    .icon-btn:hover {
      background: rgba(128,140,200,0.25);
    }

    /* MAIN EDITOR */
    .editor-container {
      flex: 1;
      padding: 28px 32px;
      overflow-y: auto;
      background: #ffffffd6;
      backdrop-filter: blur(4px);
    }
    .note-header {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 15px;
      margin-bottom: 20px;
    }
    .title-input {
      flex: 2;
      min-width: 240px;
      font-size: 2rem;
      font-weight: 600;
      border: none;
      background: transparent;
      outline: none;
      padding: 6px 0;
      border-bottom: 2px solid transparent;
      transition: 0.2s;
    }
    .title-input:focus {
      border-bottom-color: #6d76d9;
    }
    .category-input {
      flex: 1;
      min-width: 160px;
      padding: 10px 14px;
      border-radius: 40px;
      border: 1px solid #cbd0e6;
      background: rgba(255,255,255,0.7);
    }
    .editor-actions {
      display: flex;
      gap: 8px;
      margin-left: auto;
    }
    .action-btn {
      background: white;
      border: none;
      width: 44px;
      height: 44px;
      border-radius: 18px;
      font-size: 1.2rem;
      cursor: pointer;
      box-shadow: 0 4px 10px rgba(0,0,0,0.03);
      transition: 0.15s;
      color: #3f4570;
    }
    .action-btn:hover {
      background: #eaeefd;
    }
    .ql-toolbar.ql-snow {
      border-radius: 20px 20px 0 0;
      background: rgba(250,251,255,0.7);
    }
    .ql-container.ql-snow {
      border-radius: 0 0 20px 20px;
      min-height: 360px;
      font-size: 1.05rem;
      background: rgba(255,255,255,0.6);
    }
    .editor-footer {
      margin-top: 18px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .word-count {
      font-size: 0.8rem;
      opacity: 0.7;
    }
    .mic-btn {
      background: #6c5ce7;
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 40px;
      font-weight: 500;
      gap: 6px;
      display: flex;
      align-items: center;
      cursor: pointer;
    }

    .datalist-option { display: none; }
    .status-saved {
      color: #2fa36b;
      font-size: 0.8rem;
    }
  </style>
</head>
<body class="light">

<!-- SIDEBAR -->
<div class="sidebar">
  <div class="app-header">
    <h2><i class="fas fa-book-open" style="margin-right: 8px;"></i>Memora</h2>
    <button class="darkmode-toggle" id="darkmodeToggle" aria-label="Dark mode">
      <i class="fas fa-moon"></i>
    </button>
  </div>

  <button class="btn-primary" id="newNoteBtn">
    <i class="fas fa-plus-circle"></i> New note
  </button>

  <div class="search-section">
    <div class="search-wrapper">
      <i class="fas fa-search"></i>
      <input type="text" id="searchInput" placeholder="Search notes..." autocomplete="off">
    </div>
  </div>

  <div class="filter-row">
    <select id="categoryFilterSelect">
      <option value="ALL">All categories</option>
    </select>
  </div>

  <div class="notes-list" id="notesListContainer"></div>

  <!-- Storage & Tools -->
  <div class="storage-panel">
    <div class="storage-info">
      <span><i class="fas fa-database"></i> Storage</span>
      <span id="storageText">0 MB / 5 GB</span>
    </div>
    <div class="storage-bar-bg">
      <div class="storage-bar-fill" id="storageBarFill" style="width:0%"></div>
    </div>
    <div class="extra-actions">
      <button class="icon-btn" id="exportBtn"><i class="fas fa-download"></i> Export</button>
      <button class="icon-btn" id="importBtn"><i class="fas fa-upload"></i> Import</button>
      <button class="icon-btn" id="clearAllBtn"><i class="fas fa-trash-alt"></i> Clear</button>
    </div>
    <input type="file" id="importFileInput" accept=".json,application/json" style="display:none;">
  </div>
</div>

<!-- MAIN EDITOR -->
<div class="editor-container">
  <div class="note-header">
    <input type="text" id="noteTitleInput" class="title-input" placeholder="Note title" value="Untitled">
    <input list="categoryList" id="categoryInput" class="category-input" placeholder="Category" autocomplete="off">
    <datalist id="categoryList"></datalist>
    <div class="editor-actions">
      <button class="action-btn" id="deleteNoteBtn" title="Delete note"><i class="fas fa-trash-can"></i></button>
      <button class="action-btn" id="duplicateNoteBtn" title="Duplicate"><i class="fas fa-copy"></i></button>
    </div>
  </div>

  <!-- Quill Editor Container -->
  <div id="quillEditor" style="height: auto;"></div>
  
  <div class="editor-footer">
    <div>
      <span class="word-count" id="wordCountDisplay">0 words · 0 chars</span>
      <span id="saveStatus" class="status-saved" style="margin-left: 12px;"><i class="fas fa-check-circle"></i> Saved</span>
    </div>
    <button class="mic-btn" id="voiceDictationBtn"><i class="fas fa-microphone"></i> Dictate</button>
  </div>
  <div style="margin-top: 10px; font-size:0.8rem; opacity:0.6;">
    <i class="far fa-clock"></i> Last edit: <span id="lastModifiedSpan">—</span>
  </div>
</div>

<script src="https://cdn.quilljs.com/1.3.6/quill.min.js"></script>
<script>
  (function(){
    "use strict";

    // ---------- CONFIG & STORAGE ----------
    localforage.config({ name: 'MemoraNotebook', storeName: 'notes_store' });
    const MAX_STORAGE_BYTES = 5 * 1024 * 1024 * 1024; // 5 GB

    // Quill instance
    const quill = new Quill('#quillEditor', {
      theme: 'snow',
      placeholder: 'Write your thoughts, ideas, or powerful notes...',
      modules: {
        toolbar: [
          [{ header: [1, 2, 3, false] }],
          ['bold', 'italic', 'underline', 'strike'],
          [{ list: 'ordered'}, { list: 'bullet' }],
          ['blockquote', 'code-block'],
          ['link', 'image'],
          [{ color: [] }, { background: [] }],
          ['clean']
        ]
      }
    });

    // State
    let notes = [];                // array of note objects
    let currentNoteId = null;
    let isSaving = false;
    let unsavedChanges = false;
    let debounceTimer = null;
    const categoriesSet = new Set();

    // DOM elements
    const notesContainer = document.getElementById('notesListContainer');
    const searchInput = document.getElementById('searchInput');
    const categoryFilter = document.getElementById('categoryFilterSelect');
    const noteTitleInput = document.getElementById('noteTitleInput');
    const categoryInput = document.getElementById('categoryInput');
    const categoryDatalist = document.getElementById('categoryList');
    const deleteBtn = document.getElementById('deleteNoteBtn');
    const newBtn = document.getElementById('newNoteBtn');
    const darkToggle = document.getElementById('darkmodeToggle');
    const storageText = document.getElementById('storageText');
    const storageBar = document.getElementById('storageBarFill');
    const wordCountDisplay = document.getElementById('wordCountDisplay');
    const saveStatusEl = document.getElementById('saveStatus');
    const lastModifiedSpan = document.getElementById('lastModifiedSpan');
    const exportBtn = document.getElementById('exportBtn');
    const importBtn = document.getElementById('importBtn');
    const importFileInput = document.getElementById('importFileInput');
    const clearAllBtn = document.getElementById('clearAllBtn');
    const duplicateBtn = document.getElementById('duplicateNoteBtn');
    const voiceBtn = document.getElementById('voiceDictationBtn');

    // ---------- UTILS ----------
    function generateId() { return Date.now() + '-' + Math.random().toString(36).substr(2, 8); }

    function formatBytes(bytes) {
      if (bytes < 1024) return bytes + ' B';
      if (bytes < 1024*1024) return (bytes/1024).toFixed(1) + ' KB';
      if (bytes < 1024*1024*1024) return (bytes/(1024*1024)).toFixed(2) + ' MB';
      return (bytes/(1024*1024*1024)).toFixed(2) + ' GB';
    }

    // Update storage display
    async function updateStorageUsage() {
      const allNotes = await localforage.getItem('notes') || [];
      let totalSize = 0;
      for (let n of allNotes) {
        totalSize += new Blob([JSON.stringify(n)]).size;
      }
      const usedMB = totalSize / (1024*1024);
      const percent = (totalSize / MAX_STORAGE_BYTES) * 100;
      storageText.innerText = `${formatBytes(totalSize)} / 5 GB`;
      storageBar.style.width = Math.min(percent, 100) + '%';
      return totalSize;
    }

    // Refresh categories datalist & filter dropdown
    function refreshCategoryUI() {
      const cats = Array.from(categoriesSet).sort();
      categoryDatalist.innerHTML = cats.map(c => `<option value="${c}">`).join('');
      const currentFilter = categoryFilter.value;
      categoryFilter.innerHTML = '<option value="ALL">All categories</option>';
      cats.forEach(c => { categoryFilter.innerHTML += `<option value="${c}">${c}</option>`; });
      if (cats.includes(currentFilter)) categoryFilter.value = currentFilter;
      else categoryFilter.value = 'ALL';
    }

    // Update word count & last modified
    function updateEditorMeta() {
      const text = quill.getText();
      const words = text.trim().split(/\s+/).filter(w => w.length).length;
      const chars = text.replace(/\s/g, '').length;
      wordCountDisplay.innerText = `${words} words · ${chars} chars`;
    }

    // Load note into editor
    function loadNoteToEditor(note) {
      if (!note) return;
      currentNoteId = note.id;
      noteTitleInput.value = note.title || 'Untitled';
      categoryInput.value = note.category || '';
      
      try {
        if (note.contentDelta) quill.setContents(JSON.parse(note.contentDelta));
        else quill.setText('');
      } catch(e) { quill.setText(''); }
      
      if (note.updatedAt) {
        lastModifiedSpan.innerText = new Date(note.updatedAt).toLocaleString();
      } else lastModifiedSpan.innerText = '—';
      updateEditorMeta();
      saveStatusEl.innerHTML = '<i class="fas fa-check-circle"></i> Saved';
      highlightActiveNote(note.id);
    }

    // Clear editor for new note
    function clearEditor() {
      currentNoteId = null;
      noteTitleInput.value = '';
      categoryInput.value = '';
      quill.setText('');
      lastModifiedSpan.innerText = '—';
      updateEditorMeta();
      saveStatusEl.innerHTML = '<i class="fas fa-pencil"></i> New';
      highlightActiveNote(null);
    }

    function highlightActiveNote(id) {
      document.querySelectorAll('.note-item').forEach(el => {
        el.classList.remove('active');
        if (el.dataset.id === id) el.classList.add('active');
      });
    }

    // Save current editor content to DB
    async function saveCurrentNote() {
      if (isSaving) return;
      const title = noteTitleInput.value.trim() || 'Untitled';
      const category = categoryInput.value.trim();
      if (category) categoriesSet.add(category);
      
      const contentDelta = JSON.stringify(quill.getContents());
      const plainText = quill.getText();
      
      let note;
      if (currentNoteId) {
        const existing = notes.find(n => n.id === currentNoteId);
        if (existing) {
          note = { ...existing, title, category, contentDelta, plainText, updatedAt: Date.now() };
        } else {
          note = { id: generateId(), title, category, contentDelta, plainText, createdAt: Date.now(), updatedAt: Date.now() };
        }
      } else {
        note = { id: generateId(), title, category, contentDelta, plainText, createdAt: Date.now(), updatedAt: Date.now() };
      }
      
      isSaving = true;
      saveStatusEl.innerHTML = '<i class="fas fa-spinner fa-pulse"></i> Saving...';
      
      try {
        let allNotes = await localforage.getItem('notes') || [];
        const idx = allNotes.findIndex(n => n.id === note.id);
        if (idx >= 0) allNotes[idx] = note;
        else allNotes.push(note);
        await localforage.setItem('notes', allNotes);
        notes = allNotes;
        currentNoteId = note.id;
        await updateStorageUsage();
        refreshCategoryUI();
        renderNotesList();
        lastModifiedSpan.innerText = new Date(note.updatedAt).toLocaleString();
        saveStatusEl.innerHTML = '<i class="fas fa-check-circle"></i> Saved';
      } catch(e) {
        saveStatusEl.innerHTML = '<i class="fas fa-exclamation-triangle"></i> Error';
        console.warn(e);
      } finally {
        isSaving = false;
      }
    }

    // Debounced auto-save
    function autoSave() {
      if (debounceTimer) clearTimeout(debounceTimer);
      saveStatusEl.innerHTML = '<i class="fas fa-edit"></i> Unsaved';
      debounceTimer = setTimeout(() => { saveCurrentNote(); }, 700);
    }

    // Render notes list with filter/search
    function renderNotesList() {
      const searchTerm = searchInput.value.toLowerCase();
      const catFilter = categoryFilter.value;
      
      const filtered = notes.filter(n => {
        const matchSearch = n.title.toLowerCase().includes(searchTerm) || (n.plainText||'').toLowerCase().includes(searchTerm);
        const matchCat = (catFilter === 'ALL' || n.category === catFilter);
        return matchSearch && matchCat;
      }).sort((a,b) => (b.updatedAt||0) - (a.updatedAt||0));
      
      notesContainer.innerHTML = filtered.map(n => `
        <div class="note-item" data-id="${n.id}">
          <div class="note-title">${n.title || 'Untitled'}</div>
          <div class="note-meta">
            <span>${n.plainText ? n.plainText.substring(0,35)+'…' : 'Empty note'}</span>
            <span class="category-badge">${n.category || 'General'}</span>
          </div>
        </div>
      `).join('');
      
      document.querySelectorAll('.note-item').forEach(el => {
        el.addEventListener('click', () => {
          const id = el.dataset.id;
          const note = notes.find(n => n.id === id);
          if (note) loadNoteToEditor(note);
        });
      });
      if (currentNoteId) highlightActiveNote(currentNoteId);
    }

    // Delete note
    async function deleteCurrentNote() {
      if (!currentNoteId) return;
      if (!confirm('Delete this note?')) return;
      let allNotes = await localforage.getItem('notes') || [];
      allNotes = allNotes.filter(n => n.id !== currentNoteId);
      await localforage.setItem('notes', allNotes);
      notes = allNotes;
      clearEditor();
      await updateStorageUsage();
      refreshCategoryUI();
      renderNotesList();
    }

    // Duplicate note
    async function duplicateCurrentNote() {
      if (!currentNoteId) return;
      const original = notes.find(n => n.id === currentNoteId);
      if (!original) return;
      const newNote = { 
        ...original, 
        id: generateId(), 
        title: (original.title||'') + ' (copy)', 
        createdAt: Date.now(), 
        updatedAt: Date.now() 
      };
      let allNotes = await localforage.getItem('notes') || [];
      allNotes.push(newNote);
      await localforage.setItem('notes', allNotes);
      notes = allNotes;
      await updateStorageUsage();
      refreshCategoryUI();
      renderNotesList();
      loadNoteToEditor(newNote);
    }

    // ---------- INITIAL LOAD ----------
    async function initialize() {
      const storedNotes = await localforage.getItem('notes') || [];
      notes = storedNotes;
      notes.forEach(n => { if (n.category) categoriesSet.add(n.category); });
      refreshCategoryUI();
      renderNotesList();
      await updateStorageUsage();
      
      if (notes.length > 0) {
        loadNoteToEditor(notes[0]);
      } else {
        // create welcome note
        const welcome = {
          id: generateId(),
          title: '✨ Welcome to Memora',
          category: 'Personal',
          contentDelta: JSON.stringify({ ops: [{ insert: 'Your powerful notebook is ready. Start writing, dictate, and enjoy 5GB storage.\n' }] }),
          plainText: 'Your powerful notebook is ready.',
          createdAt: Date.now(),
          updatedAt: Date.now()
        };
        await localforage.setItem('notes', [welcome]);
        notes = [welcome];
        categoriesSet.add('Personal');
        refreshCategoryUI();
        renderNotesList();
        loadNoteToEditor(welcome);
        await updateStorageUsage();
      }
    }

    // ---------- EVENT LISTENERS ----------
    quill.on('text-change', () => {
      updateEditorMeta();
      autoSave();
    });
    noteTitleInput.addEventListener('input', autoSave);
    categoryInput.addEventListener('input', () => { categoriesSet.add(categoryInput.value.trim()); autoSave(); });
    
    searchInput.addEventListener('input', renderNotesList);
    categoryFilter.addEventListener('change', renderNotesList);
    
    newBtn.addEventListener('click', () => {
      if (currentNoteId) autoSave.flush && saveCurrentNote(); 
      clearEditor();
      noteTitleInput.focus();
    });
    
    deleteBtn.addEventListener('click', deleteCurrentNote);
    duplicateBtn.addEventListener('click', duplicateCurrentNote);

    // Dark mode
    darkToggle.addEventListener('click', () => {
      document.body.classList.toggle('dark');
      const icon = darkToggle.querySelector('i');
      if (document.body.classList.contains('dark')) {
        icon.classList.remove('fa-moon'); icon.classList.add('fa-sun');
      } else {
        icon.classList.remove('fa-sun'); icon.classList.add('fa-moon');
      }
    });

    // Export / Import
    exportBtn.addEventListener('click', async () => {
      const all = await localforage.getItem('notes') || [];
      const blob = new Blob([JSON.stringify(all, null, 2)], {type: 'application/json'});
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url; a.download = `memora_backup_${new Date().toISOString().slice(0,10)}.json`;
      a.click(); URL.revokeObjectURL(url);
    });
    
    importBtn.addEventListener('click', () => importFileInput.click());
    importFileInput.addEventListener('change', async (e) => {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = async (ev) => {
        try {
          const imported = JSON.parse(ev.target.result);
          if (Array.isArray(imported)) {
            if (confirm('Import will replace current notes. Continue?')) {
              await localforage.setItem('notes', imported);
              notes = imported;
              categoriesSet.clear(); imported.forEach(n => { if(n.category) categoriesSet.add(n.category); });
              refreshCategoryUI(); renderNotesList(); await updateStorageUsage();
              if(notes.length) loadNoteToEditor(notes[0]); else clearEditor();
            }
          }
        } catch(err) { alert('Invalid backup file'); }
        importFileInput.value = '';
      };
      reader.readAsText(file);
    });
    
    clearAllBtn.addEventListener('click', async () => {
      if (confirm('Delete ALL notes permanently?')) {
        await localforage.setItem('notes', []);
        notes = []; categoriesSet.clear();
        refreshCategoryUI(); renderNotesList(); await updateStorageUsage();
        clearEditor();
      }
    });

    // Voice dictation
    if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
      const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
      const recognition = new SpeechRecognition();
      recognition.continuous = false; recognition.interimResults = false; recognition.lang = 'en-US';
      voiceBtn.addEventListener('click', () => {
        recognition.start();
        voiceBtn.innerHTML = '<i class="fas fa-microphone-alt fa-beat"></i> Listening...';
      });
      recognition.onresult = (event) => {
        const transcript = event.results[0][0].transcript;
        const range = quill.getSelection(true);
        quill.insertText(range.index, transcript);
        voiceBtn.innerHTML = '<i class="fas fa-microphone"></i> Dictate';
      };
      recognition.onerror = () => { voiceBtn.innerHTML = '<i class="fas fa-microphone"></i> Dictate'; };
      recognition.onend = () => { voiceBtn.innerHTML = '<i class="fas fa-microphone"></i> Dictate'; };
    } else {
      voiceBtn.style.display = 'none';
    }

    // Additional auto-save on category change, and update categories
    window.addEventListener('beforeunload', () => { if (debounceTimer) saveCurrentNote(); });
    
    initialize();
  })();
</script>
</body>
</html>
