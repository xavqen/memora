<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>✦ Memora · Ultimate Smart Notebook</title>
  <!-- Fonts & Icons -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Noto+Sans:ital,wght@0,100..900;1,100..900&family=Noto+Sans+Arabic:wght@100..900&family=Noto+Sans+SC:wght@100..900&family=Noto+Sans+JP:wght@100..900&family=Noto+Sans+KR:wght@100..900&family=Noto+Sans+Devanagari:wght@100..900&family=Noto+Sans+Thai:wght@100..900&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <!-- Quill Editor -->
  <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
  <!-- localForage -->
  <script src="https://cdn.jsdelivr.net/npm/localforage@1.10.0/dist/localforage.min.js"></script>
  <!-- jsPDF and html2canvas -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <link rel="stylesheet" href="style.css">
  <link rel="icon" type="image/x-icon" href="favicon.ico">
</head>

<body class="light">

  <button class="menu-toggle" id="menuToggle" aria-label="Menu">
    <i class="fas fa-bars"></i>
  </button>
  <div class="overlay" id="sidebarOverlay"></div>

  <!-- SIDEBAR -->
  <div class="sidebar" id="sidebar">
    <div class="app-header">
      <h2><i class="fas fa-book-open"></i> Memora</h2>
      <div class="header-actions">
        <button class="icon-circle-btn" id="statsBtn" title="Statistics"><i class="fas fa-chart-pie"></i></button>
        <button class="icon-circle-btn" id="darkmodeToggle" title="Dark mode"><i class="fas fa-moon"></i></button>
      </div>
    </div>

    <button class="btn-primary" id="newNoteBtn">
      <i class="fas fa-plus-circle"></i> New Note
    </button>

    <div class="search-section">
      <div class="search-wrapper">
        <i class="fas fa-search"></i>
        <input type="text" id="searchInput" placeholder="Search notes..." autocomplete="off">
      </div>
    </div>

    <div class="filter-row">
      <select id="categoryFilterSelect">
        <option value="ALL">📂 All Categories</option>
      </select>
      <select id="sortOrderSelect">
        <option value="newest">🕐 Newest</option>
        <option value="oldest">🕐 Oldest</option>
        <option value="az">🔤 A-Z</option>
        <option value="za">🔤 Z-A</option>
      </select>
    </div>

    <div class="notes-list" id="notesListContainer"></div>

    <div class="storage-panel">
      <div class="storage-info">
        <span><i class="fas fa-database"></i> Storage</span>
        <span id="storageText">0 MB / 5 GB</span>
      </div>
      <div class="storage-bar-bg">
        <div class="storage-bar-fill" id="storageBarFill" style="width:0%"></div>
      </div>
      <div class="extra-actions">
        <div class="export-dropdown">
          <button class="icon-btn" id="exportBtn"><i class="fas fa-file-pdf"></i> Export PDF</button>
          <div class="export-options" id="exportOptions">
            <button class="export-option-btn" data-export="current"><i class="fas fa-file-alt"></i> Current
              Note</button>
            <button class="export-option-btn" data-export="all"><i class="fas fa-file-archive"></i> All Notes</button>
            <button class="export-option-btn" data-export="category"><i class="fas fa-folder"></i> By Category</button>
          </div>
        </div>
        <button class="icon-btn" id="importBtn"><i class="fas fa-upload"></i> Import</button>
        <button class="icon-btn" id="clearAllBtn"><i class="fas fa-trash-alt"></i> Clear</button>
      </div>
      <input type="file" id="importFileInput" accept=".json,application/json" style="display:none;">
    </div>
  </div>

  <!-- MAIN EDITOR -->
  <div class="editor-container">
    <!-- Features Row -->
    <div class="features-row">
      <!-- Language Selector -->
      <div class="feature-panel" id="languagePanel" style="position:relative;">
        <i class="fas fa-language"></i>
        <span id="currentLanguageDisplay">English</span>
        <i class="fas fa-chevron-down" style="font-size:0.6rem; opacity:0.5;"></i>
        <div class="language-dropdown" id="languageDropdown"></div>
      </div>

      <!-- Font Family -->
      <div class="feature-panel" id="fontPanel" style="position:relative;">
        <i class="fas fa-font"></i>
        <span id="currentFontDisplay">Inter</span>
        <i class="fas fa-chevron-down" style="font-size:0.6rem; opacity:0.5;"></i>
        <div class="font-dropdown" id="fontDropdown"></div>
      </div>

      <!-- Word count goal -->
      <div class="feature-panel" id="wordGoalPanel">
        <i class="fas fa-bullseye"></i>
        <span id="wordGoalDisplay">Goal: --</span>
        <input type="number" id="wordGoalInput" placeholder="Set goal"
          style="width:60px; border:1px solid #ddd; border-radius:8px; padding:4px 6px; font-size:0.7rem; margin-left:4px;"
          min="1">
      </div>

      <!-- Reading time -->
      <div class="feature-panel">
        <i class="fas fa-clock"></i>
        <span id="readingTimeDisplay">Read: 0 min</span>
      </div>

      <!-- Note info -->
      <div class="feature-panel" id="noteInfoPanel">
        <i class="fas fa-info-circle"></i>
        <span id="noteCreatedDisplay">Created: --</span>
      </div>
    </div>

    <!-- Note Header -->
    <div class="note-header">
      <input type="text" id="noteTitleInput" class="title-input" placeholder="Note title" value="Untitled">
      <input list="categoryList" id="categoryInput" class="category-input" placeholder="Category" autocomplete="off">
      <datalist id="categoryList"></datalist>
      <div class="editor-actions">
        <button class="action-btn" id="favoriteBtn" title="Favorite"><i class="far fa-star"></i></button>
        <button class="action-btn" id="pinBtn" title="Pin note"><i class="fas fa-thumbtack"></i></button>
        <button class="action-btn" id="duplicateNoteBtn" title="Duplicate"><i class="fas fa-copy"></i></button>
        <button class="action-btn danger" id="deleteNoteBtn" title="Delete"><i class="fas fa-trash-can"></i></button>
      </div>
    </div>

    <!-- Quill Editor -->
    <div id="quillEditor" style="flex:1; display:flex; flex-direction:column;"></div>

    <!-- Footer -->
    <div class="editor-footer">
      <div style="display:flex; align-items:center; gap:15px; flex-wrap:wrap;">
        <span class="word-count" id="wordCountDisplay">0 words · 0 chars</span>
        <span class="word-count" id="goalProgressDisplay"></span>
        <span id="saveStatus" class="status-saved"><i class="fas fa-check-circle"></i> Saved</span>
      </div>
      <div style="display:flex; align-items:center; gap:10px;">
        <span id="micStatusText" class="mic-status"></span>
        <button class="mic-btn" id="voiceDictationBtn"><i class="fas fa-microphone"></i> Dictate</button>
      </div>
    </div>
    <div style="margin-top: 8px; font-size:0.7rem; opacity:0.6; display:flex; gap:15px; flex-wrap:wrap;">
      <span><i class="far fa-clock"></i> Last edit: <span id="lastModifiedSpan">—</span></span>
      <span id="noteCreatedSpan" style="display:none;"><i class="far fa-calendar"></i> Created: <span
          id="createdDateSpan">—</span></span>
    </div>
  </div>

  <!-- PDF Preview Modal -->
  <div class="modal-overlay" id="pdfModal">
    <div class="modal-content">
      <div class="modal-header">
        <h3><i class="fas fa-file-pdf" style="color:#e74c3c;"></i> PDF Preview</h3>
        <button class="close-modal" id="closePdfModal"><i class="fas fa-times"></i></button>
      </div>
      <div class="pdf-preview-content" id="pdfPreviewContent"></div>
      <button class="download-pdf-btn" id="downloadPdfBtn"><i class="fas fa-download"></i> Download PDF</button>
    </div>
  </div>

  <!-- Stats Modal -->
  <div class="modal-overlay" id="statsModal">
    <div class="modal-content">
      <div class="modal-header">
        <h3><i class="fas fa-chart-pie"></i> Notebook Statistics</h3>
        <button class="close-modal" id="closeStatsModal"><i class="fas fa-times"></i></button>
      </div>
      <div class="stats-grid">
        <div class="stat-card">
          <div class="stat-value" id="statTotalNotes">0</div>
          <div class="stat-label">Total Notes</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" id="statTotalWords">0</div>
          <div class="stat-label">Total Words</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" id="statCategories">0</div>
          <div class="stat-label">Categories</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" id="statFavorites">0</div>
          <div class="stat-label">Favorites</div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.quilljs.com/1.3.6/quill.min.js"></script>
  <script src="script.js"></script>
</body>

</html>
